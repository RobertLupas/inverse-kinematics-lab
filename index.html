<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverse Kinematics Lab</title>
    <script src="./index.ts" type="module"></script>
    <style>
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: #0c252f;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div style="color: white; font-size: 24px; display: none; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; padding: 16px; gap: 16px;"
        id="warning">
        <span style='text-align: center;'>
            Your screen is too small. Please use a larger device, or resize the window.
        </span>
        <a href='javascript:location.reload()' style='color: #ffc0c0;'>Reload</a>
    </div>

    <div id="rightBox"
        style="position: absolute; display: none; flex-direction: column; gap: 8px; background-color: #001821; color: white;">
        <h1 style="text-align: center;">Inverse Kinematics Lab</h1>
        <div style="width: 100%; display: flex; gap: 4px;">
            <span>X: </span>
            <input id="xSlider" type="range" min="-300" max="300" value="50" style="flex: 1;">
        </div>
        <div style="width: 100%; display: flex; gap: 4px;">
            <span>Y: </span>
            <input id="ySlider" type="range" min="0" max="300" value="50" style="flex: 1;">
        </div>
        <div style="width: 100%; display: flex; gap: 4px;">
            <span>Bones: </span>
            <input id="bonesSlider" type="range" min="2" max="5" value="3" style="flex: 1;">
        </div>
        <div style="width: 100%; display: flex; gap: 4px;">
            <span>IK Algorithm: </span>
            <select id="ikType" style="flex: 1;">
                <option value="fabrik" selected>FABRIK</option>
            </select>
        </div>

        <div style="width: 100%; display: flex; gap: 4px;">
            <span id="logsTitle" style="display: none;">Log: </span>
            <span id="log" style="color: #e0e0e0;"></span>
            <span id="errors" style="color: #ff6767;"></span>
        </div>
    </div>

    <canvas id="main" style="display: none;"></canvas>
</body>

</html>
